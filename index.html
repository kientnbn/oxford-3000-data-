    function unhideWord(id) {
        hiddenWords.delete(id);
        saveHiddenWords();
        showToast('Word restored to Home');
        renderSidebarNav();
        const hiddenList = (window.currentAllWords || []).filter(w => hiddenWords.has(w.id));
        renderHiddenView(hiddenList);
    }

    function unhideAll() {
        const n = hiddenWords.size;
        hiddenWords.clear();
        saveHiddenWords();
        showToast(`${n} word${n !== 1 ? 's' : ''} restored to Home`);
        renderSidebarNav();
        renderHiddenView([]);
    }

    // ---- LIST VIEW (with Remove per word) ----
    function renderListView(listId, words) {
        const container = document.getElementById('wordsContainer');
        container.className = '';

        const list = wordlists.find(l => l.id === listId);
        if (!list) return;

        if (!words.length) {
            container.innerHTML = `<div class="empty-state" style="padding:40px 20px;text-align:center;">
                <div style="font-size:40px;margin-bottom:12px;">📋</div>
                <p>This list is empty.</p></div>`;
            return;
        }

        words.forEach(w => { wordsMap[w.id] = w; });

        let html = ``;

        words.forEach(w => {
            html += `
            <div class="word-card" data-word="${w.id}">
                <div class="word-header">
                    <div class="word-title">
                        <div>
                            <div class="word-main">${w.word}</div>
                            <div class="phonetic">${w.phonetic || ''}</div>
                        </div>
                        <span class="word-pos">${w.pos || ''}</span>
                    </div>
                    <div class="audio-buttons">
                        <button class="audio-btn" onclick="speakWord('${w.word}')">🔊</button>
                        <button class="read-all-btn" onclick="readAllWordById(${w.id})" title="Read tab">📖</button>
                        <button onclick="removeFromList('${listId}', ${w.id})"
                            title="Remove from list"
                            style="background:none;border:1.5px solid #e74c3c;color:#e74c3c;
                                   border-radius:50%;width:28px;height:28px;font-size:14px;
                                   font-weight:700;cursor:pointer;flex-shrink:0;
                                   display:flex;align-items:center;justify-content:center;">✕</button>
                    </div>
                </div>
                ${buildCardContent(w)}
            </div>`;
        });

        container.innerHTML = html;
        injectCheckboxes();
    }

    function removeFromList(listId, wordId) {
        const list = wordlists.find(l => l.id === listId);
        if (!list) return;
        list.wordIds = list.wordIds.filter(id => id !== wordId);
        saveWordlists();
        showToast(`Removed from "${list.name}"`);
        renderSidebarNav();
        // Re-render list view
        const listWords = (window.currentAllWords || []).filter(w => list.wordIds.includes(w.id));
        renderListView(listId, listWords);
        document.getElementById('pageBarTitle').textContent = '📋 ' + list.name;
    }

    // ---- SELECT MODE ----
    function enterSelectMode(wordId) {
        document.body.classList.add('select-mode');
        selectedIds.clear();
        if (wordId != null) toggleSelectCard(wordId);
        document.getElementById('selectActionBar').classList.add('open');
        updateSelectCount();
    }

    function exitSelectMode() {
        document.body.classList.remove('select-mode');
        selectedIds.clear();
        document.querySelectorAll('.word-card.selected').forEach(c => c.classList.remove('selected'));
        document.querySelectorAll('.card-checkbox').forEach(cb => cb.checked = false);
        document.getElementById('selectActionBar').classList.remove('open');
    }

    function toggleSelectCard(wordId) {
        const card = document.querySelector(`.word-card[data-word="${wordId}"]`);
        const cb   = card?.querySelector('.card-checkbox');
        if (!card) return;

        if (selectedIds.has(wordId)) {
            selectedIds.delete(wordId);
            card.classList.remove('selected');
            if (cb) cb.checked = false;
        } else {
            selectedIds.add(wordId);
            card.classList.add('selected');
            if (cb) cb.checked = true;
        }
        updateSelectCount();
    }

    function updateSelectCount() {
        const n = selectedIds.size;
        document.getElementById('selectCount').textContent =
            n === 0 ? 'Tap to select' : `${n} word${n > 1 ? 's' : ''} selected`;
    }

    // ---- HIDE ACTION ----
    function hideSelectedWords() {
        if (!selectedIds.size) return;
        selectedIds.forEach(id => hiddenWords.add(id));
        saveHiddenWords();
        const n = selectedIds.size;
        exitSelectMode();
        showToast(`${n} word${n>1?'s':''} hidden`);
        renderSidebarNav();
        applyFilterAndSort();   // re-render home without hidden words
    }

    // ---- MY LISTS MODAL ----
    function openListModal() {
        if (!selectedIds.size) return;
        const modal = document.getElementById('listModal');
        const items = document.getElementById('listModalItems');

        let html = wordlists.map(list => `
            <div class="list-item-row" onclick="addToList('${list.id}')">
                <span class="list-item-icon">📋</span>
                <span class="list-item-name">${escHtml(list.name)}</span>
                <span class="list-item-count">${list.wordIds.length} words</span>
            </div>`).join('');

        if (!wordlists.length) {
            html = `<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px;">
                No lists yet. Create one below!</div>`;
        }

        items.innerHTML = html;
        modal.classList.add('open');
    }

    function closeListModal(e) {
        if (!e || e.target === document.getElementById('listModal')) {
            document.getElementById('listModal').classList.remove('open');
        }
    }

    function addToList(listId) {
        const list = wordlists.find(l => l.id === listId);
        if (!list) return;
        let added = 0;
        selectedIds.forEach(id => {
            if (!list.wordIds.includes(id)) { list.wordIds.push(id); added++; }
        });
        saveWordlists();
        closeListModal({target: document.getElementById('listModal')});
        exitSelectMode();
        showToast(`${added} word${added>1?'s':''} added to "${list.name}"`);
        renderSidebarNav();
    }

    // ---- CUSTOM NAME INPUT (replaces prompt() for iOS compat) ----
    let _nameInputCallback = null;

    function openNameInput(title, placeholder, callback) {
        _nameInputCallback = callback;
        const modal = document.getElementById('nameInputModal');
        document.getElementById('nameInputTitle').textContent = title;
        const field = document.getElementById('nameInputField');
        field.placeholder = placeholder || 'Enter name…';
        field.value = '';
        clearNameInputError();
        modal.style.display = 'flex';
        setTimeout(() => field.focus(), 100);
    }

    function showNameInputError(msg) {
        const err = document.getElementById('nameInputError');
        const field = document.getElementById('nameInputField');
        err.textContent = msg;
        err.style.display = 'block';
        field.style.borderColor = '#e74c3c';
        field.focus();
        // Shake animation
        field.style.animation = 'none';
        requestAnimationFrame(() => { field.style.animation = 'shake .3s ease'; });
    }

    function clearNameInputError() {
        document.getElementById('nameInputError').style.display = 'none';
        document.getElementById('nameInputField').style.borderColor = 'var(--secondary)';
    }

    function confirmNameInput() {
        const val = document.getElementById('nameInputField').value.trim();
        if (!val) {
            showNameInputError('Name cannot be empty.');
            return;
        }
        // Duplicate check (callback decides — pass name to callback which validates)
        if (_nameInputCallback) {
            const result = _nameInputCallback(val);
            // If callback returns false → stay open (validation failed inside callback)
            if (result !== false) {
                document.getElementById('nameInputModal').style.display = 'none';
                clearNameInputError();
                _nameInputCallback = null;
            }
        }
    }

    function cancelNameInput() {
        document.getElementById('nameInputModal').style.display = 'none';
        _nameInputCallback = null;
    }

    function isDuplicateListName(name, excludeId = null) {
        return wordlists.some(l => l.name.toLowerCase() === name.toLowerCase() && l.id !== excludeId);
    }

    function createNewList() {
        document.getElementById('listModal').classList.remove('open');
        openNameInput('New List', 'List name…', (name) => {
            if (isDuplicateListName(name)) {
                showNameInputError(`"${name}" already exists. Please use a different name.`);
                return false;   // signal: keep modal open
            }
            const list = { id: genId(), name, wordIds: [] };
            wordlists.push(list);
            saveWordlists();
            addToList(list.id);
        });
    }

    function promptNewList() {
        openNameInput('New List', 'List name…', (name) => {
            if (isDuplicateListName(name)) {
                showNameInputError(`"${name}" already exists. Please use a different name.`);
                return false;   // signal: keep modal open
            }
            const list = { id: genId(), name, wordIds: [] };
            wordlists.push(list);
            saveWordlists();
            showToast(`"${list.name}" created`);
            renderSidebarNav();
        });
    }

    // ---- LONG PRESS ----
    function setupLongPress() {
        let pressTimer  = null;
        let pressTarget = null;
        let moved       = false;

        document.getElementById('wordsContainer').addEventListener('pointerdown', e => {
            const card = e.target.closest('.word-card');
            if (!card || e.target.closest('button, input, select, a')) return;
            moved = false;
            pressTarget = card;
            card.classList.add('pressing');

            pressTimer = setTimeout(() => {
                if (moved) return;
                card.classList.remove('pressing');
                const wordId = parseInt(card.dataset.word);
                if (!document.body.classList.contains('select-mode')) {
                    enterSelectMode(wordId);
                }
            }, 500);
        }, { passive: true });

        document.getElementById('wordsContainer').addEventListener('pointermove', e => {
            if (Math.abs(e.movementX) > 5 || Math.abs(e.movementY) > 5) {
                moved = true;
                clearTimeout(pressTimer);
                if (pressTarget) pressTarget.classList.remove('pressing');
            }
        }, { passive: true });

        const cancel = () => {
            clearTimeout(pressTimer);
            if (pressTarget) pressTarget.classList.remove('pressing');
            pressTarget = null;
        };
        document.getElementById('wordsContainer').addEventListener('pointerup',     cancel, { passive: true });
        document.getElementById('wordsContainer').addEventListener('pointercancel', cancel, { passive: true });

        // Tap card in select mode → toggle
        document.getElementById('wordsContainer').addEventListener('click', e => {
            if (!document.body.classList.contains('select-mode')) return;
            const card = e.target.closest('.word-card');
            if (!card || e.target.closest('button')) return;
            toggleSelectCard(parseInt(card.dataset.word));
        });
    }

    // ---- FILTER HOME (exclude hidden) ----
    const _origApplyFilter = typeof applyFilterAndSort === 'function' ? applyFilterAndSort : null;

    // ---- HELPERS ----
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove('show'), 2500);
    }

    function escHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Inject checkbox into every word card (after render)
    function injectCheckboxes() {
        document.querySelectorAll('.word-card:not([data-cb])').forEach(card => {
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.className = 'card-checkbox';
            cb.setAttribute('aria-label', 'Select word');
            cb.addEventListener('change', () => {
                toggleSelectCard(parseInt(card.dataset.word));
            });
            card.appendChild(cb);
            card.setAttribute('data-cb', '1');
        });
    }

    </script>

    </div>
